<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>판매 베스트 대시보드</title>
  <style>
    *, ::before, ::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --primary: #1a237e;
      --accent: #c62828;
      --store: #1565c0;
      --text: #1a1a2e;
      --muted: #7a7a9d;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
    }

    body {
      font-family: Pretendard, "Noto Sans KR", -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── 헤더 ── */
    .site-header {
      background: linear-gradient(135deg, #1a237e 0%, #283593 60%, #1565c0 100%);
      color: #fff;
      padding: 22px 24px 18px;
      text-align: center;
      box-shadow: rgba(26,35,126,.4) 0 4px 20px;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .site-header h1 { font-size: clamp(1.3rem, 4vw, 1.8rem); font-weight: 800; letter-spacing: -.5px; }
    .site-header .subtitle { margin-top: 4px; font-size: .8rem; opacity: .8; }
    .update-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: .75rem;
    }

    /* ── 메인 탭 ── */
    .main-tabs {
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      display: flex;
      position: sticky;
      top: 93px;
      z-index: 150;
      box-shadow: var(--shadow);
    }
    .tab-btn {
      flex: 1;
      padding: 13px 16px;
      font-size: .92rem;
      font-weight: 700;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      transition: color .2s, border-color .2s;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab-btn:hover:not(.active) { color: var(--text); background: #f8fafc; }

    /* ── 컨트롤 바 (기간 선택) ── */
    .controls-bar {
      background: var(--surface);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      position: sticky;
      top: 142px;
      z-index: 140;
    }
    .period-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: .82rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }
    .period-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .period-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

    .date-range-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }
    .date-input {
      padding: 5px 10px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      font-size: .82rem;
      color: var(--text);
      background: #fff;
      cursor: pointer;
    }
    .date-input:focus { outline: none; border-color: var(--accent); }
    .date-sep { color: var(--muted); font-size: .85rem; font-weight: 600; }

    /* ── 매장 선택 바 ── */
    .store-picker {
      background: var(--surface);
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: none;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      gap: 8px;
      align-items: center;
      position: sticky;
      top: 186px;
      z-index: 130;
      white-space: nowrap;
    }
    .store-picker.visible { display: flex; }
    .store-pill {
      display: inline-block;
      padding: 5px 14px;
      border-radius: 16px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .store-pill.active {
      color: #fff;
      border-color: transparent;
    }
    .store-pill:hover:not(.active) { border-color: #888; color: var(--text); }

    /* ── 로딩 ── */
    #loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 55vh;
      gap: 20px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 5px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .9s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .loading-text { color: var(--muted); font-size: .9rem; }

    /* ── 에러 ── */
    #error-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      gap: 14px;
      padding: 40px;
      text-align: center;
    }
    #error-screen .icon { font-size: 2.8rem; }
    #error-screen h2 { font-size: 1.1rem; }
    #error-screen p { color: var(--muted); font-size: .88rem; line-height: 1.6; }
    #error-screen code {
      background: #f1f5f9; border-radius: 6px; padding: 8px 14px;
      font-size: .78rem; display: block; text-align: left;
      word-break: break-all; max-width: 560px; color: var(--accent);
    }

    /* ── 메인 콘텐츠 ── */
    #main-content {
      display: none;
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px 80px;
    }

    /* ── 섹션 헤더 ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0;
    }
    .section-title-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
      font-weight: 800;
      color: #fff;
      background: var(--accent);
      padding: 13px 20px;
      border-radius: var(--radius) var(--radius) 0 0;
      width: 100%;
    }
    .section-title-bar.store-style { background: var(--store); }

    /* ── 테이블 ── */
    .table-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }
    .best-table { width: 100%; border-collapse: collapse; }
    .best-table thead th {
      background: #fce4e4;
      color: #8b1c1c;
      font-size: .76rem;
      font-weight: 700;
      letter-spacing: .04em;
      padding: 11px 14px;
      text-align: center;
      border-bottom: 2px solid #f5c6c6;
    }
    .best-table thead th:nth-child(4) { text-align: left; }
    .best-table thead th:nth-child(5),
    .best-table thead th:nth-child(7) { text-align: right; }
    .best-table.store-style thead th {
      background: #e3eaf8;
      color: #1a237e;
      border-bottom-color: #b8c8ee;
    }
    .best-table tbody tr { transition: background .12s; border-bottom: 1px solid var(--border); }
    .best-table tbody tr:last-child { border-bottom: none; }
    .best-table tbody tr:hover { background: #f8faff; }
    .best-table tbody tr.rank-1 { background: #fffbeb; }
    .best-table tbody tr.rank-2 { background: #f8fafc; }
    .best-table tbody tr.rank-3 { background: #fff7ed; }
    .best-table td { padding: 10px 14px; font-size: .87rem; vertical-align: middle; }

    /* ── 셀 스타일 ── */
    .rank-cell { text-align: center; font-weight: 700; width: 60px; }
    .rank-medal { font-size: 1.15rem; }
    .rank-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 26px; height: 26px; border-radius: 50%;
      font-size: .78rem; font-weight: 700;
      background: #e2e8f0; color: var(--muted);
    }
    .category-cell { text-align: center; width: 72px; }
    .category-badge {
      display: inline-block;
      background: #e8eaf6; color: #3949ab;
      font-size: .7rem; font-weight: 600;
      padding: 2px 8px; border-radius: 20px;
    }
    .img-cell { width: 60px; text-align: center; padding: 6px 8px !important; }
    .prod-img {
      width: 48px; height: 48px;
      object-fit: cover; border-radius: 8px;
      border: 1px solid var(--border);
      background: #f1f5f9;
      display: block; margin: 0 auto;
    }
    .prod-img-placeholder {
      width: 48px; height: 48px; border-radius: 8px;
      background: #e2e8f0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; margin: 0 auto;
    }
    .name-cell { font-weight: 600; }
    .price-cell, .qty-cell { text-align: right; color: var(--muted); font-size: .82rem; white-space: nowrap; }
    .sales-cell {
      text-align: right; font-weight: 700;
      color: var(--accent); font-size: .95rem; white-space: nowrap;
    }
    .sales-cell.store-style { color: var(--store); font-size: .88rem; }

    .empty-row td { text-align: center; color: var(--muted); font-size: .85rem; padding: 32px; }

    /* ── 새로고침 버튼 ── */
    .refresh-btn {
      position: fixed; bottom: 24px; right: 24px;
      width: 50px; height: 50px; border-radius: 50%;
      background: var(--primary); color: #fff;
      border: none; font-size: 1.3rem; cursor: pointer;
      box-shadow: rgba(26,35,126,.4) 0 4px 16px;
      display: none; align-items: center; justify-content: center;
      transition: transform .2s, box-shadow .2s;
      z-index: 100;
    }
    .refresh-btn:hover { transform: scale(1.1); }
    .refresh-btn.spinning { animation: spin .7s linear infinite; }

    /* ── 반응형 ── */
    @media (max-width: 640px) {
      .best-table .price-cell { display: none; }
      .best-table thead th:nth-child(5) { display: none; }
      .site-header { top: 0; }
      .main-tabs { top: 82px; }
      .controls-bar { top: 131px; }
      .store-picker { top: 175px; }
    }
  </style>
</head>
<body>

<!-- ── 헤더 ── -->
<header class="site-header">
  <h1>🏆 판매 베스트 대시보드</h1>
  <div class="update-badge">
    <span>📅</span>
    <span id="updated-at">불러오는 중...</span>
  </div>
</header>

<!-- ── 메인 탭 ── -->
<nav class="main-tabs">
  <button class="tab-btn active" id="tab-overall" onclick="switchTab('overall')">🏠 전체 매장</button>
  <button class="tab-btn"        id="tab-store"   onclick="switchTab('store')">🏪 매장별</button>
</nav>

<!-- ── 기간 선택 바 ── -->
<div class="controls-bar">
  <button class="period-btn active" id="btn-yesterday" onclick="setQuickPeriod('yesterday')">어제</button>
  <button class="period-btn"        id="btn-week"      onclick="setQuickPeriod('week')">금주</button>
  <button class="period-btn"        id="btn-lastweek"  onclick="setQuickPeriod('lastweek')">전주</button>
  <button class="period-btn"        id="btn-month"     onclick="setQuickPeriod('month')">이번달</button>
  <button class="period-btn"        id="btn-lastmonth" onclick="setQuickPeriod('lastmonth')">전월</button>
  <div class="date-range-wrap">
    <input type="date" id="date-start" class="date-input" onchange="onDateChange()">
    <span class="date-sep">~</span>
    <input type="date" id="date-end" class="date-input" onchange="onDateChange()">
  </div>
</div>

<!-- ── 매장 선택 바 ── -->
<div id="store-picker" class="store-picker"></div>

<!-- ── 로딩 ── -->
<div id="loading-screen">
  <div class="spinner"></div>
  <div class="loading-text">데이터를 불러오는 중입니다...</div>
</div>

<!-- ── 에러 ── -->
<div id="error-screen">
  <div class="icon">⚠️</div>
  <h2>데이터를 불러올 수 없습니다</h2>
  <p>API_URL을 확인하거나 Apps Script를 재배포해 주세요.</p>
  <code id="error-msg"></code>
</div>

<!-- ── 메인 콘텐츠 ── -->
<main id="main-content">
  <div class="table-card">
    <div id="section-title-bar" class="section-title-bar">
      <span id="section-icon">🥇</span>
      <span id="section-title">전체 판매 베스트 TOP 20</span>
    </div>
    <table class="best-table" id="best-table">
      <thead>
        <tr>
          <th>순위</th>
          <th>이미지</th>
          <th>분류</th>
          <th>제품명</th>
          <th>판매가</th>
          <th>판매수량</th>
          <th>💰 판매금액</th>
        </tr>
      </thead>
      <tbody id="table-tbody"></tbody>
    </table>
  </div>
</main>

<!-- ── 새로고침 ── -->
<button class="refresh-btn" id="refresh-btn" onclick="refresh()" title="새로고침">↻</button>

<script>
  // ============================================================
  //  ★ Apps Script 웹 앱 배포 URL
  // ============================================================
  const API_URL = 'https://script.google.com/macros/s/AKfycbwLoh3VgIt2oXbgcGzBb-07dsgxSlkh7uLp3KDDXvpkH2BmPZcqXxe8BAmRPZIyfAI/exec';

  const STORES = ['남악','부천','의정부','인천','유성','여수','율하','충장',
                  '동수원','송파','제주','괴정','강서','순천','평택','고척',
                  '원주','마리오','창원'];
  const STORE_COLORS = {
    '남악':'#1565c0','부천':'#2e7d32','의정부':'#e65100','인천':'#6a1b9a',
    '유성':'#00695c','여수':'#ad1457','율하':'#558b2f','충장':'#283593',
    '동수원':'#f57f17','송파':'#00838f','제주':'#4e342e','괴정':'#37474f',
    '강서':'#9e9d24','순천':'#bf360c','평택':'#4527a0','고척':'#01579b',
    '원주':'#1b5e20','마리오':'#ff8f00','창원':'#0d47a1'
  };

  const fmt = {
    num  : n => (n||0).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ','),
    price: n => n > 0 ? fmt.num(n) + '원' : '-',
    qty  : n => n > 0 ? fmt.num(n) + '개' : '-'
  };

  let state = {
    tab: 'overall',
    startDate: '', endDate: '',
    store: STORES[0],
    cacheOverall: {}, // 전체 탭 캐시
    cacheStores : {}  // 매장별 탭 캐시
  };

  // ── 날짜 유틸 ──
  function toYMD(d) {
    return d.getFullYear() + '-' +
           String(d.getMonth()+1).padStart(2,'0') + '-' +
           String(d.getDate()).padStart(2,'0');
  }
  // 주의 시작: 화요일 기준 (화~월)
  function getThisTuesday(d) {
    const day = d.getDay(); // 0=일,1=월,2=화,...,6=토
    const diff = day === 0 ? -5 : day === 1 ? -6 : 2 - day;
    const tue = new Date(d);
    tue.setDate(d.getDate() + diff);
    return tue;
  }

  // ── 빠른 기간 설정 ──
  function setQuickPeriod(type) {
    const today = new Date();
    let start = today, end = today;

    if (type === 'yesterday') {
      start = new Date(today); start.setDate(today.getDate() - 1);
      end   = start;
    } else if (type === 'week') {
      start = getThisTuesday(today);   // 이번주 화요일~오늘
    } else if (type === 'lastweek') {
      const thisTue = getThisTuesday(today);
      end   = new Date(thisTue); end.setDate(thisTue.getDate() - 1);   // 저번주 월요일
      start = new Date(end);     start.setDate(end.getDate() - 6);     // 저번주 화요일
    } else if (type === 'month') {
      start = new Date(today.getFullYear(), today.getMonth(), 1);
    } else if (type === 'lastmonth') {
      const first = new Date(today.getFullYear(), today.getMonth(), 1);
      end   = new Date(first); end.setDate(first.getDate() - 1);
      start = new Date(end.getFullYear(), end.getMonth(), 1);
    }

    state.startDate = toYMD(start);
    state.endDate   = toYMD(end);
    document.getElementById('date-start').value = state.startDate;
    document.getElementById('date-end').value   = state.endDate;

    ['yesterday','week','lastweek','month','lastmonth'].forEach(t =>
      document.getElementById('btn-' + t).classList.toggle('active', t === type)
    );
    state.cacheOverall = {};
    state.cacheStores  = {};
    loadData();
  }

  // ── 날짜 직접 변경 ──
  function onDateChange() {
    const s = document.getElementById('date-start').value;
    const e = document.getElementById('date-end').value;
    if (!s || !e || s > e) return;
    ['yesterday','week','lastweek','month','lastmonth'].forEach(t =>
      document.getElementById('btn-' + t).classList.remove('active')
    );
    state.startDate = s;
    state.endDate   = e;
    state.cacheOverall = {};
    state.cacheStores  = {};
    loadData();
  }

  // ── 탭 전환 ──
  function switchTab(tab) {
    state.tab = tab;
    document.getElementById('tab-overall').classList.toggle('active', tab === 'overall');
    document.getElementById('tab-store').classList.toggle('active', tab === 'store');
    document.getElementById('store-picker').classList.toggle('visible', tab === 'store');
    loadData();
  }

  // ── 매장 선택 ──
  function switchStore(name) {
    state.store = name;
    document.querySelectorAll('.store-pill').forEach(el => {
      const active = el.dataset.store === name;
      el.classList.toggle('active', active);
      el.style.background = active ? (STORE_COLORS[name] || '#1565c0') : '';
    });
    const cached = state.cacheStores[state.startDate + '_' + state.endDate];
    if (cached) renderContent(cached);
  }

  // ── 데이터 로드 ──
  async function loadData() {
    const dateKey   = state.startDate + '_' + state.endDate;
    const isOverall = state.tab === 'overall';
    const cache     = isOverall ? state.cacheOverall : state.cacheStores;

    if (cache[dateKey]) { renderContent(cache[dateKey]); return; }

    showLoading();
    document.getElementById('refresh-btn').classList.add('spinning');

    try {
      let url = API_URL + '?startDate=' + state.startDate + '&endDate=' + state.endDate;
      if (!isOverall) url += '&view=stores';

      const res  = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      if (data.error === 'session_expired') {
        showError('이지어드민 세션이 만료됐습니다.\nApps Script 스크립트 속성에서 PHPSESSID를 갱신해 주세요.');
        return;
      }
      if (data.error) throw new Error(data.error);

      cache[dateKey] = data;
      if (data.updatedAt) document.getElementById('updated-at').textContent = data.updatedAt + ' 업데이트';
      renderContent(data);
    } catch(err) {
      showError(err.message);
    } finally {
      document.getElementById('refresh-btn').classList.remove('spinning');
    }
  }

  // ── 콘텐츠 렌더 ──
  function renderContent(data) {
    const label = state.startDate === state.endDate
      ? state.startDate
      : state.startDate + ' ~ ' + state.endDate;

    if (state.tab === 'overall') {
      renderTable(data.overall || [], false, label);
    } else {
      const sd = (data.stores || []).find(s => s.name === state.store);
      renderTable(sd ? (sd.products || []) : [], true, label);
    }
    showContent();
  }

  // ── 테이블 렌더 ──
  function renderTable(items, isStore, label) {
    const tbody    = document.getElementById('table-tbody');
    const titleBar = document.getElementById('section-title-bar');
    const icon     = document.getElementById('section-icon');
    const title    = document.getElementById('section-title');
    const table    = document.getElementById('best-table');
    const topN     = isStore ? 10 : 20;

    if (isStore) {
      titleBar.className = 'section-title-bar store-style';
      titleBar.style.background = STORE_COLORS[state.store] || '#1565c0';
      icon.textContent  = '🏪';
      title.textContent = state.store + '  TOP ' + topN + '  ·  ' + label;
      table.className   = 'best-table store-style';
    } else {
      titleBar.className    = 'section-title-bar';
      titleBar.style.background = '';
      icon.textContent  = '🥇';
      title.textContent = '전체 판매 베스트  TOP ' + topN + '  ·  ' + label;
      table.className   = 'best-table';
    }

    if (!items || items.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="7">해당 기간에 데이터가 없습니다.</td></tr>';
      return;
    }

    tbody.innerHTML = items.slice(0, topN).map((item, idx) => {
      const rank = idx + 1;
      return `<tr class="${rank <= 3 ? 'rank-' + rank : ''}">
        ${rankCell(rank)}
        ${imgCell(item.i)}
        <td class="category-cell"><span class="category-badge">${item.c || '-'}</span></td>
        <td class="name-cell">${item.n || '-'}</td>
        <td class="price-cell">${fmt.price(item.p || 0)}</td>
        <td class="qty-cell">${fmt.qty(item.q || 0)}</td>
        <td class="sales-cell${isStore ? ' store-style' : ''}">${fmt.price(item.s || 0)}</td>
      </tr>`;
    }).join('');
  }

  function rankCell(rank) {
    const medals = ['🥇','🥈','🥉'];
    const inner  = rank <= 3 ? `<span class="rank-medal">${medals[rank-1]}</span>` : `<span class="rank-num">${rank}</span>`;
    return `<td class="rank-cell">${inner}</td>`;
  }

  function imgCell(url) {
    if (!url) return `<td class="img-cell"><div class="prod-img-placeholder">📦</div></td>`;
    return `<td class="img-cell"><img class="prod-img" src="${url}" alt="상품이미지" loading="lazy"
      onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'prod-img-placeholder',textContent:'📦'}))"></td>`;
  }

  function showLoading() {
    document.getElementById('loading-screen').style.display = 'flex';
    document.getElementById('error-screen').style.display   = 'none';
    document.getElementById('main-content').style.display   = 'none';
    document.getElementById('refresh-btn').style.display    = 'none';
  }
  function showContent() {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('error-screen').style.display   = 'none';
    document.getElementById('main-content').style.display   = 'block';
    document.getElementById('refresh-btn').style.display    = 'flex';
  }
  function showError(msg) {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('error-screen').style.display   = 'flex';
    document.getElementById('main-content').style.display   = 'none';
    document.getElementById('error-msg').textContent        = msg || '';
  }

  function refresh() {
    state.cacheOverall = {};
    state.cacheStores  = {};
    loadData();
  }

  function init() {
    // 매장 선택 버튼 생성
    const picker = document.getElementById('store-picker');
    STORES.forEach(name => {
      const btn = document.createElement('button');
      btn.className    = 'store-pill' + (name === state.store ? ' active' : '');
      btn.dataset.store = name;
      btn.textContent  = '🏪 ' + name;
      if (name === state.store) btn.style.background = STORE_COLORS[name] || '#1565c0';
      btn.onclick = () => switchStore(name);
      picker.appendChild(btn);
    });

    // 기본 기간: 오늘
    setQuickPeriod('yesterday');
  }

  init();
</script>
</body>
</html>
