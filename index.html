<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>판매 베스트 대시보드</title>
  <style>
    *, ::before, ::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --primary: #1a237e;
      --accent: #c62828;
      --store: #1565c0;
      --text: #1a1a2e;
      --muted: #7a7a9d;
      --border: #e2e8f0;
      --gold: #f59e0b;
      --silver: #94a3b8;
      --bronze: #d97706;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
    }

    body {
      font-family: Pretendard, "Noto Sans KR", -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── 헤더 ── */
    .site-header {
      background: linear-gradient(135deg, #1a237e 0%, #283593 60%, #1565c0 100%);
      color: #fff;
      padding: 28px 24px 24px;
      text-align: center;
      box-shadow: rgba(26,35,126,.4) 0 4px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .site-header h1 { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 800; letter-spacing: -.5px; }
    .site-header .subtitle { margin-top: 6px; font-size: .85rem; opacity: .8; }
    .update-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: .8rem;
    }

    /* ── 로딩 ── */
    #loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 20px;
    }
    .spinner {
      width: 52px; height: 52px;
      border: 5px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .9s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .loading-text { color: var(--muted); font-size: .95rem; }

    /* ── 에러 ── */
    #error-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      gap: 14px;
      padding: 40px;
      text-align: center;
    }
    #error-screen .icon { font-size: 3rem; }
    #error-screen h2 { font-size: 1.15rem; color: var(--text); }
    #error-screen p { color: var(--muted); font-size: .9rem; line-height: 1.6; }
    #error-screen code {
      background: #f1f5f9;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: .8rem;
      display: block;
      text-align: left;
      word-break: break-all;
      max-width: 560px;
      color: var(--accent);
    }

    /* ── 메인 ── */
    .main-content {
      display: none;
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 16px 60px;
    }

    /* ── 섹션 타이틀 ── */
    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.2rem;
      font-weight: 800;
      color: #fff;
      background: var(--accent);
      padding: 14px 20px;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .section-title.store-section {
      background: var(--store);
      border-radius: var(--radius) var(--radius) 0 0;
    }

    /* ── 전체 베스트 테이블 ── */
    .overall-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      margin-bottom: 40px;
    }
    .best-table { width: 100%; border-collapse: collapse; }
    .best-table thead th {
      background: #fce4e4;
      color: #8b1c1c;
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      padding: 12px 14px;
      text-align: center;
      border-bottom: 2px solid #f5c6c6;
    }
    .best-table thead th:nth-child(4) { text-align: left; }
    .best-table thead th:nth-child(5),
    .best-table thead th:nth-child(7) { text-align: right; }
    .best-table tbody tr { transition: background .15s; border-bottom: 1px solid var(--border); }
    .best-table tbody tr:hover { background: #f8faff; }
    .best-table tbody tr.rank-1 { background: #fffbeb; }
    .best-table tbody tr.rank-2 { background: #f8fafc; }
    .best-table tbody tr.rank-3 { background: #fff7ed; }
    .best-table td { padding: 11px 14px; font-size: .88rem; vertical-align: middle; }

    /* ── 공통 셀 ── */
    .rank-cell { text-align: center; font-weight: 700; width: 64px; }
    .rank-medal { font-size: 1.15rem; }
    .rank-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 50%;
      font-size: .8rem; font-weight: 700;
      background: #e2e8f0; color: var(--muted);
    }
    .category-cell { text-align: center; width: 80px; }
    .category-badge {
      display: inline-block;
      background: #e8eaf6; color: #3949ab;
      font-size: .72rem; font-weight: 600;
      padding: 3px 8px; border-radius: 20px;
    }
    .img-cell { width: 60px; text-align: center; padding: 6px 8px !important; }
    .prod-img {
      width: 48px; height: 48px;
      object-fit: cover; border-radius: 8px;
      border: 1px solid var(--border);
      background: #f1f5f9;
      display: block; margin: 0 auto;
    }
    .prod-img-placeholder {
      width: 48px; height: 48px; border-radius: 8px;
      background: #e2e8f0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; margin: 0 auto;
    }
    .name-cell { font-weight: 600; color: var(--text); }
    .price-cell, .qty-cell { text-align: right; color: var(--muted); font-size: .83rem; white-space: nowrap; }
    .sales-cell { text-align: right; font-weight: 700; color: var(--accent); font-size: .95rem; white-space: nowrap; }
    .sales-bar-wrap { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
    .sales-bar {
      height: 6px; border-radius: 3px;
      background: linear-gradient(90deg, #1565c0, #42a5f5);
      min-width: 4px; transition: width .6s;
    }
    .sales-num { font-weight: 700; font-size: .9rem; white-space: nowrap; }

    /* ── 매장별 그리드 ── */
    .stores-section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .stores-section-title {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.2rem; font-weight: 800; color: var(--text);
    }
    .stores-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }
    .store-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: box-shadow .2s, transform .2s;
    }
    .store-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
    .store-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; color: #fff;
    }
    .store-name { font-size: 1rem; font-weight: 700; }
    .store-badge {
      font-size: .72rem; font-weight: 600;
      background: rgba(255,255,255,.2);
      border: 1px solid rgba(255,255,255,.35);
      border-radius: 12px; padding: 2px 10px;
    }

    /* ── 매장 테이블 ── */
    .store-table { width: 100%; border-collapse: collapse; }
    .store-table thead th {
      font-size: .72rem; font-weight: 700;
      letter-spacing: .03em;
      padding: 8px 10px; text-align: center;
      border-bottom: 1px solid var(--border);
      color: var(--muted); background: #f8fafc;
    }
    .store-table thead th:nth-child(3) { text-align: left; }
    .store-table thead th:nth-child(4),
    .store-table thead th:nth-child(5) { text-align: right; }
    .store-table tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
    .store-table tbody tr:last-child { border-bottom: none; }
    .store-table tbody tr:hover { background: #f8faff; }
    .store-table tbody tr.rank-1 { background: #fffbeb; }
    .store-table tbody tr.rank-2 { background: #fafafa; }
    .store-table tbody tr.rank-3 { background: #fff7ed; }
    .store-table td { padding: 9px 10px; font-size: .82rem; vertical-align: middle; }
    .store-table .rank-cell { width: 44px; }
    .store-table .rank-num { width: 24px; height: 24px; font-size: .75rem; }
    .store-table .img-cell { width: 50px; padding: 5px 6px !important; }
    .store-table .prod-img { width: 40px; height: 40px; }
    .store-table .prod-img-placeholder { width: 40px; height: 40px; font-size: 1rem; }
    .store-table .sales-cell { font-size: .82rem; color: var(--store); font-weight: 700; }
    .store-table .category-badge { font-size: .68rem; }

    .empty-row td { text-align: center; color: var(--muted); font-size: .85rem; padding: 24px; }

    /* ── 새로고침 버튼 ── */
    .refresh-btn {
      position: fixed; bottom: 28px; right: 28px;
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--primary); color: #fff;
      border: none; font-size: 1.3rem; cursor: pointer;
      box-shadow: rgba(26,35,126,.4) 0 4px 16px;
      display: none; align-items: center; justify-content: center;
      transition: transform .2s, box-shadow .2s;
    }
    .refresh-btn:hover { transform: scale(1.1); box-shadow: rgba(26,35,126,.5) 0 6px 20px; }
    .refresh-btn.spinning { animation: spin .7s linear infinite; }

    @media (max-width: 640px) {
      .stores-grid { grid-template-columns: 1fr; }
      .best-table .price-cell { display: none; }
      .best-table thead th:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <h1>🏆 판매 베스트 대시보드</h1>
  <div class="subtitle">전체 매장 · 18개 지점 주간 판매 현황</div>
  <div class="update-badge">
    <span>📅</span>
    <span id="updated-at">불러오는 중...</span>
  </div>
</header>

<div id="loading-screen">
  <div class="spinner"></div>
  <div class="loading-text">데이터를 불러오는 중입니다...</div>
</div>

<div id="error-screen">
  <div class="icon">⚠️</div>
  <h2>데이터를 불러올 수 없습니다</h2>
  <p>
    <code>index.html</code> 파일 상단의 <code>API_URL</code> 값을<br>
    Apps Script 웹 앱 배포 URL로 교체해 주세요.
  </p>
  <code id="error-msg"></code>
</div>

<main id="main-content" class="main-content">
  <!-- 전체 베스트 -->
  <div class="overall-card">
    <div class="section-title">
      <span>🥇</span>
      <span>전체 판매 베스트 TOP 20</span>
    </div>
    <table class="best-table">
      <thead>
        <tr>
          <th>순위</th>
          <th>이미지</th>
          <th>분류</th>
          <th>제품명</th>
          <th>판매가</th>
          <th>금주판매</th>
          <th>💰 금주매출</th>
        </tr>
      </thead>
      <tbody id="overall-tbody"></tbody>
    </table>
  </div>

  <!-- 매장별 베스트 -->
  <div class="stores-section-header">
    <div class="stores-section-title">
      <span>🏪</span>
      <span>매장별 판매 베스트 TOP 10</span>
    </div>
  </div>
  <div id="stores-grid" class="stores-grid"></div>
</main>

<button class="refresh-btn" id="refresh-btn" onclick="loadData()" title="새로고침">↻</button>

<script>
  // ============================================================
  //  ★ 여기에 Apps Script 웹 앱 배포 URL을 붙여넣으세요 ★
  // ============================================================
  const API_URL = 'YOUR_APPS_SCRIPT_URL_HERE';

  // ── 매장별 헤더 색상 팔레트
  const STORE_COLORS = [
    '#1565c0','#2e7d32','#e65100','#6a1b9a','#00695c',
    '#ad1457','#558b2f','#283593','#f57f17','#00838f',
    '#4e342e','#37474f','#9e9d24','#bf360c','#4527a0',
    '#01579b','#1b5e20','#ff8f00'
  ];

  // ── 포맷 유틸 ──
  const fmt = {
    num  : n => n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ','),
    price: n => n > 0 ? fmt.num(n) + '원' : '-',
    qty  : n => n > 0 ? fmt.num(n) + '개' : '-'
  };

  // ── 순위 셀 렌더 ──
  function rankCell(rank) {
    const medals = ['🥇','🥈','🥉'];
    const inner = rank <= 3
      ? `<span class="rank-medal">${medals[rank-1]}</span>`
      : `<span class="rank-num">${rank}</span>`;
    return `<td class="rank-cell">${inner}</td>`;
  }

  // ── 이미지 셀 렌더 ──
  function imgCell(imgUrl) {
    if (!imgUrl) {
      return `<td class="img-cell"><div class="prod-img-placeholder">📦</div></td>`;
    }
    return `<td class="img-cell">
      <img class="prod-img" src="${imgUrl}" alt="상품이미지" loading="lazy"
        onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'prod-img-placeholder',textContent:'📦'}))">
    </td>`;
  }

  // ── 전체 베스트 TOP 20 렌더 ──
  function renderOverall(items) {
    const maxRevenue = Math.max(...items.map(x => x.revenue || 0));
    const tbody = document.getElementById('overall-tbody');
    tbody.innerHTML = items.map((item, idx) => {
      const rank = idx + 1;
      const barWidth = maxRevenue > 0 ? Math.round((item.revenue / maxRevenue) * 80) : 0;
      return `<tr class="rank-${rank}">
        ${rankCell(rank)}
        ${imgCell(item.img)}
        <td class="category-cell"><span class="category-badge">${item.category || '-'}</span></td>
        <td class="name-cell">${item.name || '-'}</td>
        <td class="price-cell">${fmt.price(item.price || 0)}</td>
        <td class="qty-cell">${fmt.qty(item.qty || 0)}</td>
        <td class="sales-cell">
          <div class="sales-bar-wrap">
            <div class="sales-bar" style="width:${barWidth}px"></div>
            <span class="sales-num">${fmt.price(item.revenue || 0)}</span>
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  // ── 매장별 베스트 TOP 10 렌더 ──
  function renderStores(stores) {
    const grid = document.getElementById('stores-grid');
    grid.innerHTML = stores.map((store, si) => {
      const color = store.color || STORE_COLORS[si % STORE_COLORS.length];
      const rows = store.items && store.items.length > 0
        ? store.items.map((item, idx) => {
            const rank = idx + 1;
            return `<tr class="rank-${rank}">
              ${rankCell(rank)}
              ${imgCell(item.img)}
              <td class="name-cell">${item.name || '-'}</td>
              <td class="qty-cell">${fmt.qty(item.qty || 0)}</td>
              <td class="sales-cell">${fmt.price(item.revenue || 0)}</td>
            </tr>`;
          }).join('')
        : `<tr class="empty-row"><td colspan="5">판매 데이터 없음</td></tr>`;

      return `<div class="store-card">
        <div class="store-header" style="background:${color}">
          <div class="store-name">🏪 ${store.name}</div>
          <span class="store-badge">TOP 10</span>
        </div>
        <table class="store-table">
          <thead>
            <tr>
              <th>순위</th><th>이미지</th><th>제품명</th><th>판매수</th><th>💰 매출</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }).join('');
  }

  // ── 에러 표시 ──
  function showError(msg) {
    document.getElementById('loading-screen').style.display = 'none';
    const err = document.getElementById('error-screen');
    err.style.display = 'flex';
    document.getElementById('error-msg').textContent = msg || '';
  }

  // ── 데이터 로드 ──
  async function loadData() {
    if (!API_URL || API_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
      showError('index.html 파일 상단의 API_URL 값을 Apps Script 웹 앱 배포 URL로 교체해 주세요.');
      return;
    }

    // 새로고침 버튼 스피닝 처리
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');

    document.getElementById('loading-screen').style.display = 'flex';
    document.getElementById('error-screen').style.display = 'none';
    document.getElementById('main-content').style.display = 'none';

    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      // 업데이트 시각
      if (data.updated) {
        document.getElementById('updated-at').textContent = data.updated + ' 업데이트';
      }

      // 전체 베스트
      if (data.overall && data.overall.length) {
        renderOverall(data.overall.slice(0, 20));
      }

      // 매장별 베스트
      if (data.stores && data.stores.length) {
        renderStores(data.stores);
      }

      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
      btn.style.display = 'flex';
    } catch (e) {
      showError(e.message);
    } finally {
      btn.classList.remove('spinning');
    }
  }

  // 페이지 로드 시 자동 실행
  loadData();
</script>
</body>
</html>
